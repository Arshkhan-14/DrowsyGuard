version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: dg_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - dg_network

  ai-service:
    build: ./ai-service
    container_name: dg_ai
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - AI_PORT=8001
    networks:
      - dg_network

  server:
    build: ./server
    container_name: dg_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/drowsiness_db
      - JWT_SECRET=${JWT_SECRET:-supersecretchangeme}
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:5173
      - NODE_ENV=production
    depends_on:
      - mongo
    networks:
      - dg_network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: dg_client
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_AI_WS_URL=ws://localhost:8001/ws
    depends_on:
      - server
      - ai-service
    networks:
      - dg_network

volumes:
  mongo_data:

networks:
  dg_network:
    driver: bridge
